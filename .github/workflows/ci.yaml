name: CI
on:
  pull_request:
    branches:
      - main
      - release/**
  schedule:
    - cron: "13 3 * * *"
  workflow_dispatch: {}

jobs:
  linters:
    name: Linting and static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 5  # usually 1-2, rarely 3 mins (because of installations)
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: uv sync --group lint
      - run: uv run pre-commit run --all-files
      - run: uv run mypy

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5  # usually 2-3 mins
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --group test
      - run: uv run coverage run --branch --source=kmock -m pytest --color=yes --timeout=2

      - name: Publish coverage to Coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          flag-name: ${{ matrix.python-version }}
        if: success()
        continue-on-error: true  # tends to fail with no code changes (e.g. only CI/docs)
      - name: Publish coverage to CodeCov.io
        uses: codecov/codecov-action@v5
        if: success()
        env:
          PYTHON: ${{ matrix.python-version }}
        with:
          flags: unit
          env_vars: PYTHON
          token: ${{ secrets.CODECOV_TOKEN }}

  # No coverage: PyPy performs extremely poorly with tracing/coverage (13 mins vs. 3 mins).
  # Extra time: 2-3 mins for building the dependencies (since no binary wheels are available).
  # Extra time: PyPy is good with JIT for repetitive code; tests are too unique for JIT.
  pypy-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "pypy-3.10", "pypy-3.11" ]
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --group test
      - run: uv run pytest --color=yes --timeout=2

  e2e-tests:
    name: E2E with K3s
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: nolar/setup-k3d-k3s@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
          k3s-args: --disable=metrics-server@server:*
      - run: uv sync --extra fetch --group test
      - run: uv run pytest tests/k8s-preloading/test_cli_fetching_e2e.py --color=yes --timeout=30

  coveralls-finish:
    name: Finalize coveralls.io
    needs: [unit-tests, pypy-tests]
    runs-on: ubuntu-24.04
    steps:
      - name: Finish coverage at Coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
